<div x-data="transactionModal()" @open-transaction-modal.window="showModal = true" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;" x-show="showModal" x-transition.opacity>
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <!-- Overlay -->
        <div class="fixed inset-0 transition-opacity bg-black/80 backdrop-blur-sm" @click="showModal = false"></div>

        <!-- Modal Panel -->
        <div class="inline-block align-bottom bg-[#040608]/90 backdrop-blur-2xl rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full border border-white/10 ring-1 ring-white/5">
            
            <!-- Header -->
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-white/5">
                <div class="flex items-center gap-3">
                    <div class="p-2 rounded-xl bg-emerald-500/20 text-emerald-400">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-lg font-bold text-white tracking-wide">Add New Transaction</h3>
                </div>
                <button @click="showModal = false" class="text-slate-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-white/5">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-8">
                <!-- Notifications -->
                <div x-show="notification.message" 
                     x-transition
                     :class="notification.type === 'error' ? 'bg-rose-500/10 border-rose-500/20 text-rose-400' : 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400'"
                     class="border p-4 rounded-xl mb-6 text-sm font-bold flex items-center gap-3">
                    <i :data-lucide="notification.type === 'error' ? 'alert-circle' : 'check-circle'" class="w-5 h-5"></i>
                    <span x-text="notification.message"></span>
                </div>

                <!-- Tabs -->
                <div class="flex p-1 mb-8 bg-black/40 rounded-xl w-max border border-white/5">
                    <button @click="activeTab = 'manual'" 
                            :class="activeTab === 'manual' ? 'bg-emerald-500 text-black shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white'" 
                            class="px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all">
                        Manual
                    </button>
                    <button @click="activeTab = 'voice'" 
                            :class="activeTab === 'voice' ? 'bg-emerald-500 text-black shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white'" 
                            class="px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all">
                        Voice
                    </button>
                    <button @click="activeTab = 'image'" 
                            :class="activeTab === 'image' ? 'bg-emerald-500 text-black shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white'" 
                            class="px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all">
                        Scan
                    </button>
                </div>

                <!-- Manual Tab -->
                <div x-show="activeTab === 'manual'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                    <form @submit.prevent="submitManual">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Vendor Name</label>
                                <input type="text" x-model="manualData.vendor_name" required 
                                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder-slate-600"
                                       placeholder="e.g. Starbucks">
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Amount</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-3 text-slate-500">₹</span>
                                    <input type="number" step="0.01" x-model="manualData.amount" required 
                                           class="w-full bg-white/5 border border-white/10 rounded-xl pl-8 pr-4 py-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder-slate-600"
                                           placeholder="0.00">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Category</label>
                                <select x-model="manualData.category" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all appearance-none">
                                    <template x-for="cat in categories" :key="cat">
                                        <option :value="cat" x-text="cat" class="bg-slate-900"></option>
                                    </template>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Type</label>
                                <select x-model="manualData.transaction_type" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all appearance-none">
                                    <option value="EXPENSE" class="bg-slate-900">Expense</option>
                                    <option value="INCOME" class="bg-slate-900">Income</option>
                                    <option value="INVESTMENT" class="bg-slate-900">Investment</option>
                                </select>
                            </div>
                            
                            <div class="col-span-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Description</label>
                                <textarea x-model="manualData.description" rows="2" 
                                          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder-slate-600"
                                          placeholder="Optional details..."></textarea>
                            </div>
                        </div>

                        <div class="mt-8 flex justify-end">
                            <button type="submit" :disabled="loading" 
                                    class="bg-emerald-500 hover:bg-emerald-400 text-black px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all flex items-center gap-2">
                                <span x-show="!loading">Add Transaction</span>
                                <i x-show="!loading" data-lucide="plus" class="w-4 h-4"></i>
                                <span x-show="loading" class="animate-spin h-4 w-4 border-2 border-black rounded-full border-t-transparent"></span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Voice Tab -->
                <div x-show="activeTab === 'voice'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                    <div class="flex flex-col items-center justify-center py-8 space-y-8">
                        
                        <div class="relative group">
                            <div class="absolute inset-0 bg-emerald-500 blur-2xl opacity-20 group-hover:opacity-40 transition-opacity rounded-full"></div>
                            <button @click="toggleRecording" 
                                    :class="recording ? 'bg-rose-500 animate-pulse' : 'bg-emerald-500 hover:scale-105'" 
                                    class="relative w-24 h-24 rounded-full flex items-center justify-center text-black shadow-2xl transition-all duration-300">
                                <i :data-lucide="recording ? 'mic-off' : 'mic'" class="w-10 h-10"></i>
                            </button>
                        </div>
                        
                        <p class="text-center text-slate-400 font-medium" x-text="recording ? 'Listening... Tap to stop' : 'Tap mic to start speaking'"></p>
                        
                        <div class="w-full">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Transcript</label>
                            <div class="relative">
                                <textarea x-model="voiceTranscript" rows="3" 
                                          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all resize-none"
                                          placeholder="Say something like: 'Spent 500 on groceries and 200 on fuel'"></textarea>
                                <div class="absolute bottom-3 right-3">
                                    <button @click="processVoice" :disabled="!voiceTranscript || loading" 
                                            class="bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                        <span x-text="loading ? 'Processing...' : 'Process AI'"></span>
                                        <i data-lucide="wand-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Image Tab -->
                <div x-show="activeTab === 'image'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                     <div class="py-8 space-y-6">
                        <div class="border-2 border-dashed border-white/10 rounded-2xl p-10 text-center hover:bg-white/5 hover:border-emerald-500/50 transition-all cursor-pointer group" @click="$refs.fileInput.click()">
                             <input type="file" x-ref="fileInput" @change="handleFileChange" accept="image/*" class="hidden">
                             <div x-show="!imagePreview" class="flex flex-col items-center gap-4">
                                <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <i data-lucide="upload-cloud" class="w-8 h-8 text-slate-400 group-hover:text-emerald-400 transition-colors"></i>
                                </div>
                                <div>
                                    <p class="text-white font-bold">Click to upload receipt</p>
                                    <p class="text-sm text-slate-500">Supports JPG, PNG</p>
                                </div>
                             </div>
                             <img x-show="imagePreview" :src="imagePreview" class="mx-auto max-h-64 rounded-xl shadow-lg">
                        </div>

                         <button @click="processImage" :disabled="!imageFile || loading" 
                                 class="w-full bg-emerald-500 hover:bg-emerald-400 text-black px-6 py-4 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i data-lucide="scan-line" class="w-5 h-5"></i>
                            <span x-text="loading ? 'Scanning Receipt...' : 'Scan Receipt'"></span>
                        </button>
                     </div>
                </div>

                <!-- AI Review Section -->
                <div x-show="reviewMode" x-transition class="mt-8 border-t border-white/10 pt-8">
                    <div class="flex items-center justify-between mb-6">
                        <h4 class="text-white font-bold text-lg">Review items</h4>
                        <span class="px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-bold uppercase tracking-widest">
                            AI Detected
                        </span>
                    </div>
                    
                     <div class="overflow-hidden rounded-xl border border-white/10 bg-black/20">
                        <table class="min-w-full divide-y divide-white/10">
                            <thead class="bg-white/5">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Vendor</th>
                                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Category</th>
                                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Description</th>
                                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Amount</th>
                                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Type</th>
                                    <th class="px-4 py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/10">
                                <template x-for="(item, index) in stagedTransactions" :key="index">
                                    <tr class="hover:bg-white/5 transition-colors">
                                        <td class="px-4 py-2"><input type="text" x-model="item.vendor" class="bg-transparent border-0 text-white text-sm focus:ring-0 w-full font-medium placeholder-slate-600" placeholder="Vendor"></td>
                                        <td class="px-4 py-2">
                                            <select x-model="item.category" class="bg-transparent border-0 text-white text-xs rounded focus:ring-0 cursor-pointer">
                                                 <template x-for="cat in categories" :key="cat">
                                                    <option :value="cat" x-text="cat" :selected="item.category === cat" class="bg-slate-900"></option>
                                                </template>
                                            </select>
                                        </td>
                                        <td class="px-4 py-2"><input type="text" x-model="item.description" class="bg-transparent border-0 text-slate-300 text-xs focus:ring-0 w-full placeholder-slate-600" placeholder="Description"></td>
                                        <td class="px-4 py-2"><input type="number" step="0.01" x-model="item.amount" class="bg-transparent border-0 text-emerald-400 font-bold text-sm focus:ring-0 w-24"></td>
                                        <td class="px-4 py-2">
                                            <select x-model="item.type" class="bg-transparent border-0 text-slate-300 text-xs rounded focus:ring-0 cursor-pointer">
                                                <option value="EXPENSE" class="bg-slate-900">Exp</option>
                                                <option value="INCOME" class="bg-slate-900">Inc</option>
                                                <option value="INVESTMENT" class="bg-slate-900">Inv</option>
                                            </select>
                                        </td>
                                        <td class="px-4 py-2 text-center">
                                            <button @click="removeStaged(index)" class="text-rose-500 hover:text-rose-400 p-1 rounded-lg hover:bg-rose-500/10 transition-colors">
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="mt-6 flex justify-end items-center gap-3">
                        <button @click="addStagedRow" class="px-4 py-2 rounded-lg hover:bg-white/5 text-slate-400 hover:text-white text-xs font-bold uppercase tracking-widest transition-all">
                            + Add Item
                        </button>
                        <button @click="preConfirmStaged" :disabled="loading" class="bg-emerald-500 hover:bg-emerald-400 text-black px-6 py-2 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all flex items-center gap-2">
                            <span x-text="loading ? 'Saving...' : 'Confirm All'"></span>
                            <i x-show="!loading" data-lucide="check" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Wallet Confirmation Popup -->
        <div x-show="showConfirmPopup" x-transition
             class="fixed inset-0 z-[60] flex items-center justify-center p-4">
            <!-- Backdrop -->
            <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" @click="showConfirmPopup = false"></div>
            
            <!-- Popup Content -->
            <div class="relative bg-slate-900 border border-white/10 rounded-2xl p-6 max-w-sm w-full shadow-2xl transform transition-all">
                <div class="text-center mb-6">
                    <div class="mx-auto w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center mb-4">
                        <i data-lucide="wallet" class="w-6 h-6 text-emerald-400"></i>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-2">Select Wallet Source</h3>
                    <p class="text-sm text-slate-400">Where should this transaction be recorded?</p>
                </div>

                <div class="space-y-3">
                    <button @click="finalizeSubmission(false)" class="w-full flex items-center justify-between p-4 rounded-xl bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 transition-all group">
                        <div class="text-left">
                            <div class="text-sm font-bold text-white">Main Wallet</div>
                            <div class="text-xs text-emerald-400/70">Updates total balance</div>
                        </div>
                        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </button>

                    <button @click="finalizeSubmission(true)" class="w-full flex items-center justify-between p-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all group">
                        <div class="text-left">
                            <div class="text-sm font-bold text-white">External Wallet</div>
                            <div class="text-xs text-slate-500">Track only (No balance impact)</div>
                        </div>
                        <i data-lucide="external-link" class="w-5 h-5 text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </button>
                </div>
                
                <div class="mt-6 text-center">
                    <button @click="showConfirmPopup = false" class="text-xs font-bold text-slate-500 hover:text-white uppercase tracking-widest transition-colors">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('transactionModal', () => ({
        showModal: false,
        activeTab: 'manual',
        loading: false,
        notification: { message: '', type: '' },
        recording: false,
        voiceTranscript: '',
        imageFile: null,
        imagePreview: null,
        reviewMode: false,
        
        // Confirmation Logic
        showConfirmPopup: false,
        pendingSubmissionType: null, // 'manual' or 'staged'
        
        categories: [
            'Housing', 'Utilities', 'Food', 'Transportation', 'Healthcare', 
            'Personal Care', 'Entertainment', 'Clothing & Apparel', 'Groceries', 
            'Tax', 'Investment', 'Savings', 'Liabilities', 'Other'
        ],

        manualData: {
            vendor_name: '',
            amount: '',
            category: 'Food',
            transaction_type: 'EXPENSE',
            description: '',
            is_external: false
        },

        stagedTransactions: [],

        init() {
            this.$watch('showModal', value => {
                if (value) {
                    this.$nextTick(() => lucide.createIcons());
                } else {
                    this.stopRecording();
                }
            });
            this.$watch('reviewMode', value => {
                if (value) this.$nextTick(() => lucide.createIcons());
            });
             this.$watch('activeTab', value => {
                this.$nextTick(() => lucide.createIcons());
            });
             this.$watch('showConfirmPopup', value => {
                if(value) this.$nextTick(() => lucide.createIcons());
             });
        },

        // Triggered by Manual Form Submit
        submitManual() {
            this.pendingSubmissionType = 'manual';
            this.showConfirmPopup = true;
        },
        
        // Triggered by 'Confirm All' in AI Review
        preConfirmStaged() {
            this.pendingSubmissionType = 'staged';
            this.showConfirmPopup = true;
        },

        // Called by Popup Buttons
        finalizeSubmission(isExternal) {
            this.showConfirmPopup = false;
            this.loading = true;

            if (this.pendingSubmissionType === 'manual') {
                this.manualData.is_external = isExternal;
                this._processManualSubmit();
            } else if (this.pendingSubmissionType === 'staged') {
                this._processStagedSubmit(isExternal);
            }
        },

        _processManualSubmit() {
            const formData = new FormData();
            for (const key in this.manualData) {
                formData.append(key, this.manualData[key]);
            }
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            fetch('{% url "dashboard:add_manual" %}', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.showNotification(data.message, 'success');
                    this.resetForms();
                    setTimeout(() => window.location.reload(), 1000); 
                } else {
                    this.showNotification(data.message, 'error');
                }
            })
            .catch(err => {
                this.loading = false;
                this.showNotification('Something went wrong', 'error');
            });
        },

        toggleRecording() {
            if (this.recording) {
                this.stopRecording();
            } else {
                if (!('webkitSpeechRecognition' in window)) {
                    alert('Web Speech API not supported in this browser.');
                    return;
                }
                this.recognition = new webkitSpeechRecognition();
                this.recognition.continuous = true;
                this.recognition.interimResults = true;
                
                this.recognition.onstart = () => { this.recording = true; };
                this.recognition.onend = () => { 
                    this.recording = false; 
                };
                
                this.recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            this.voiceTranscript += event.results[i][0].transcript + ' ';
                        }
                    }
                };
                
                this.recognition.start();
            }
        },

        stopRecording() {
            if (this.recognition) {
                this.recognition.stop();
            }
            this.recording = false;
        },

        processVoice() {
            this.loading = true;
            fetch('{% url "dashboard:process_voice" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ transcript: this.voiceTranscript })
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.populateStaged(data.data);
                    this.reviewMode = true;
                } else {
                    this.showNotification(data.message, 'error');
                }
            });
        },

        handleFileChange(e) {
            const file = e.target.files[0];
            if (file) {
                this.imageFile = file;
                this.imagePreview = URL.createObjectURL(file);
            }
        },

        processImage() {
            this.loading = true;
            const formData = new FormData();
            formData.append('image', this.imageFile);
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            fetch('{% url "dashboard:process_image" %}', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.populateStaged(data.data);
                    this.reviewMode = true;
                } else {
                    this.showNotification(data.message, 'error');
                }
            });
        },

        populateStaged(data) {
            this.stagedTransactions = [];
            
            // OPTIMIZED AGGREGATION LOGIC
            const aggregatedMap = new Map();

            // Data is { "Category": [ ["Vendor", Amount, "Desc", "Type"], ... ], ... }
            for (const [category, items] of Object.entries(data)) {
                if (Array.isArray(items)) {
                    items.forEach(item => {
                        const vendor = item[0] || 'Unknown';
                        const amount = parseFloat(item[1] || 0);
                        const desc = item[2] || '';
                        const type = (item[3] || 'EXPENSE').toUpperCase();

                        // Key handling: Normalize category
                        if (aggregatedMap.has(category)) {
                            const existing = aggregatedMap.get(category);
                            existing.amount += amount;
                            existing.description += `, ${desc}`;
                            // Keep vendor if same, else append
                            if (!existing.vendor.includes(vendor)) existing.vendor += `, ${vendor}`;
                        } else {
                            aggregatedMap.set(category, {
                                vendor: vendor,
                                category: category,
                                amount: amount,
                                description: desc,
                                type: type,
                                source: this.activeTab.toUpperCase()
                            });
                        }
                    });
                }
            }
            
            // Convert Map back to Array
            this.stagedTransactions = Array.from(aggregatedMap.values());
            
            // Refresh icons after populating
            this.$nextTick(() => lucide.createIcons());
        },

        addStagedRow() {
            this.stagedTransactions.push({
                vendor: '', category: 'Other', amount: 0, description: '', type: 'EXPENSE', source: this.activeTab.toUpperCase()
            });
            this.$nextTick(() => lucide.createIcons());
        },

        removeStaged(index) {
            this.stagedTransactions.splice(index, 1);
        },

        _processStagedSubmit(isExternal) {
            fetch('{% url "dashboard:save_confirmed" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ 
                    transactions: this.stagedTransactions,
                    is_external: isExternal
                })
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.showNotification(data.message, 'success');
                    setTimeout(() => window.location.reload(), 1500); 
                } else {
                    this.showNotification(data.message, 'error');
                }
            });
        },

        showNotification(msg, type) {
            this.notification = { message: msg, type: type };
            setTimeout(() => this.notification.message = '', 3000);
            this.$nextTick(() => lucide.createIcons());
        },

        resetForms() {
             this.manualData = { vendor_name: '', amount: '', category: 'Food', transaction_type: 'EXPENSE', description: '', is_external: false };
             this.voiceTranscript = '';
             this.imageFile = null;
             this.imagePreview = null;
             this.stagedTransactions = [];
             this.reviewMode = false;
        }

    }))
});
</script>
