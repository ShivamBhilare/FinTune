<div x-data="transactionModal()" @open-transaction-modal.window="showModal = true" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;" x-show="showModal">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <!-- Overlay -->
        <div class="fixed inset-0 transition-opacity bg-slate-900 bg-opacity-75" @click="showModal = false"></div>

        <!-- Modal Panel -->
        <div class="inline-block align-bottom bg-slate-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full border border-slate-700">
            
            <!-- Header -->
            <div class="bg-slate-700 px-4 py-3 border-b border-slate-600 flex justify-between items-center">
                <h3 class="text-lg leading-6 font-medium text-white">Add New Transaction</h3>
                <button @click="showModal = false" class="text-slate-400 hover:text-white">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="p-6">
                <!-- Notifications -->
                <div x-show="notification.message" 
                     :class="notification.type === 'error' ? 'bg-red-900/50 border-red-500 text-red-200' : 'bg-green-900/50 border-green-500 text-green-200'"
                     class="border p-3 rounded-lg mb-4 text-sm font-medium">
                    <span x-text="notification.message"></span>
                </div>

                <!-- Tabs -->
                <div class="flex space-x-4 mb-6 border-b border-slate-700 pb-2">
                    <button @click="activeTab = 'manual'" :class="activeTab === 'manual' ? 'text-yellow-400 border-b-2 border-yellow-400' : 'text-slate-400 hover:text-white'" class="pb-2 px-1 text-sm font-medium transition-colors">
                        Manual Entry
                    </button>
                    <button @click="activeTab = 'voice'" :class="activeTab === 'voice' ? 'text-yellow-400 border-b-2 border-yellow-400' : 'text-slate-400 hover:text-white'" class="pb-2 px-1 text-sm font-medium transition-colors">
                        Voice Input
                    </button>
                    <button @click="activeTab = 'image'" :class="activeTab === 'image' ? 'text-yellow-400 border-b-2 border-yellow-400' : 'text-slate-400 hover:text-white'" class="pb-2 px-1 text-sm font-medium transition-colors">
                        Image Upload
                    </button>
                </div>

                <!-- Manual Tab -->
                <div x-show="activeTab === 'manual'">
                    <form @submit.prevent="submitManual">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Fields rendered manually to match form structure or use template tags if passed -->
                            <!-- Assuming we construct manual fields here matching Django form for simplicity in UI, or load form partial -->
                            <!-- Re-implementing fields to ensure Alpine binding -->
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-1">Vendor Name</label>
                                <input type="text" x-model="manualData.vendor_name" required class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-1">Amount</label>
                                <input type="number" step="0.01" x-model="manualData.amount" required class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-1">Category</label>
                                <select x-model="manualData.category" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                                    <template x-for="cat in categories" :key="cat">
                                        <option :value="cat" x-text="cat"></option>
                                    </template>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-1">Type</label>
                                <select x-model="manualData.transaction_type" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
                                    <option value="EXPENSE">Expense</option>
                                    <option value="INCOME">Income</option>
                                    <option value="INVESTMENT">Investment</option>
                                </select>
                            </div>
                            
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-slate-300 mb-1">Description</label>
                                <textarea x-model="manualData.description" rows="2" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-yellow-400"></textarea>
                            </div>
                            
                            <div class="col-span-2 flex items-center">
                                <input type="checkbox" x-model="manualData.is_external" id="manual_external" class="w-4 h-4 text-yellow-400 bg-slate-700 border-slate-600 rounded focus:ring-yellow-400">
                                <label for="manual_external" class="ml-2 text-sm text-slate-300">External Transaction (Does not affect wallet balance)</label>
                            </div>
                        </div>

                        <div class="mt-6 flex justify-end">
                            <button type="submit" :disabled="loading" class="bg-yellow-400 text-slate-900 px-4 py-2 rounded-lg font-bold hover:bg-yellow-300 transition-colors flex items-center">
                                <span x-show="!loading">Add Transaction</span>
                                <span x-show="loading" class="animate-spin ml-2 h-4 w-4 border-2 border-slate-900 rounded-full border-t-transparent"></span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Voice Tab -->
                <div x-show="activeTab === 'voice'">
                    <div class="space-y-4">
                        <div class="flex justify-center my-4">
                            <button @click="toggleRecording" :class="recording ? 'bg-red-500 animate-pulse' : 'bg-indigo-600 hover:bg-indigo-500'" class="p-4 rounded-full text-white transition-all shadow-lg">
                                <svg x-show="!recording" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                                </svg>
                                <svg x-show="recording" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                                </svg>
                            </button>
                        </div>
                        <p class="text-center text-slate-400 text-sm" x-text="recording ? 'Listening...' : 'Click mic to speak'"></p>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Transcript</label>
                            <textarea x-model="voiceTranscript" rows="3" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-yellow-400" placeholder="Spoken text converts here... e.g. 'Spent 500 on groceries at Dmart'"></textarea>
                        </div>

                        <button @click="processVoice" :disabled="!voiceTranscript || loading" class="w-full bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-500 transition-colors">
                            <span x-text="loading ? 'Processing with AI...' : 'Process Voice'"></span>
                        </button>
                    </div>
                </div>

                <!-- Image Tab -->
                <div x-show="activeTab === 'image'">
                     <div class="space-y-4">
                        <div class="border-2 border-dashed border-slate-600 rounded-lg p-6 text-center hover:bg-slate-750 transition-colors relative cursor-pointer" @click="$refs.fileInput.click()">
                             <input type="file" x-ref="fileInput" @change="handleFileChange" accept="image/*" class="hidden">
                             <div x-show="!imagePreview">
                                <svg class="mx-auto h-12 w-12 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                <p class="mt-1 text-sm text-slate-400">Upload a receipt image</p>
                             </div>
                             <img x-show="imagePreview" :src="imagePreview" class="mx-auto max-h-48 rounded-lg">
                        </div>

                         <button @click="processImage" :disabled="!imageFile || loading" class="w-full bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-500 transition-colors">
                            <span x-text="loading ? 'Scanning Receipt...' : 'Process Image'"></span>
                        </button>
                     </div>
                </div>

                <!-- AI Review Section -->
                <div x-show="reviewMode" class="mt-8 border-t border-slate-700 pt-6">
                    <h4 class="text-white font-bold mb-4">Review & Confirm</h4>
                    
                     <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-700">
                            <thead class="bg-slate-750">
                                <tr>
                                    <th class="px-3 py-2 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Vendor</th>
                                    <th class="px-3 py-2 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Category</th>
                                    <th class="px-3 py-2 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Amount</th>
                                    <th class="px-3 py-2 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Type</th>
                                    <th class="px-3 py-2 text-center text-xs font-medium text-slate-400 uppercase tracking-wider">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-700">
                                <template x-for="(item, index) in stagedTransactions" :key="index">
                                    <tr>
                                        <td class="px-3 py-2"><input type="text" x-model="item.vendor" class="bg-transparent border-0 text-white text-sm focus:ring-0 w-full"></td>
                                        <td class="px-3 py-2">
                                            <select x-model="item.category" class="bg-slate-700 border-0 text-white text-xs rounded focus:ring-0">
                                                 <template x-for="cat in categories" :key="cat">
                                                    <option :value="cat" x-text="cat" :selected="item.category === cat"></option>
                                                </template>
                                            </select>
                                        </td>
                                        <td class="px-3 py-2"><input type="number" step="0.01" x-model="item.amount" class="bg-transparent border-0 text-white text-sm focus:ring-0 w-24"></td>
                                        <td class="px-3 py-2">
                                            <select x-model="item.type" class="bg-slate-700 border-0 text-white text-xs rounded focus:ring-0">
                                                <option value="EXPENSE">Exp</option>
                                                <option value="INCOME">Inc</option>
                                                <option value="INVESTMENT">Inv</option>
                                            </select>
                                        </td>
                                        <td class="px-3 py-2 text-center">
                                            <button @click="removeStaged(index)" class="text-red-400 hover:text-red-300">
                                                &times;
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="mt-4 flex justify-between items-center">
                         <div class="flex items-center">
                            <input type="checkbox" x-model="aiExternal" id="ai_external" class="w-4 h-4 text-yellow-400 bg-slate-700 border-slate-600 rounded focus:ring-yellow-400">
                            <label for="ai_external" class="ml-2 text-sm text-slate-300">External (No Wallet Deduct)</label>
                        </div>
                        <div class="space-x-2">
                            <button @click="addStagedRow" class="text-sm text-indigo-400 hover:text-indigo-300">+ Add Item</button>
                            <button @click="confirmStaged" :disabled="loading" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-green-400 transition-colors">
                                <span x-text="loading ? 'Saving...' : 'Confirm All'"></span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('transactionModal', () => ({
        showModal: false,
        activeTab: 'manual',
        loading: false,
        notification: { message: '', type: '' },
        recording: false,
        voiceTranscript: '',
        imageFile: null,
        imagePreview: null,
        reviewMode: false,
        
        categories: [
            'Housing', 'Utilities', 'Food', 'Transportation', 'Healthcare', 
            'Personal Care', 'Entertainment', 'Clothing & Apparel', 'Groceries', 
            'Tax', 'Investment', 'Savings', 'Liabilities', 'Other'
        ],

        manualData: {
            vendor_name: '',
            amount: '',
            category: 'Food',
            transaction_type: 'EXPENSE',
            description: '',
            is_external: false
        },

        stagedTransactions: [],
        aiExternal: false,

        submitManual() {
            this.loading = true;
            const formData = new FormData();
            for (const key in this.manualData) {
                formData.append(key, this.manualData[key]);
            }
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            fetch('{% url "add_manual" %}', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.showNotification(data.message, 'success');
                    this.resetForms();
                    setTimeout(() => window.location.reload(), 1500); 
                } else {
                    this.showNotification(data.message, 'error');
                }
            })
            .catch(err => {
                this.loading = false;
                this.showNotification('Something went wrong', 'error');
            });
        },

        toggleRecording() {
            if (this.recording) {
                if (this.recognition) {
                    this.recognition.stop();
                }
                this.recording = false;
            } else {
                if (!('webkitSpeechRecognition' in window)) {
                    alert('Web Speech API not supported in this browser.');
                    return;
                }
                this.recognition = new webkitSpeechRecognition();
                this.recognition.continuous = true; // Changed to true to prevent auto-sleep
                this.recognition.interimResults = true; // Enable interim results to show progress
                
                this.recognition.onstart = () => { this.recording = true; };
                this.recognition.onend = () => { 
                    this.recording = false; 
                };
                
                this.recognition.onresult = (event) => {
                    // Update transcript with latest final result plus continuous interim
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            this.voiceTranscript += event.results[i][0].transcript + ' ';
                        }
                    }
                };
                
                this.recognition.start();
            }
        },

        processVoice() {
            this.loading = true;
            fetch('{% url "process_voice" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ transcript: this.voiceTranscript })
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.populateStaged(data.data);
                    this.reviewMode = true;
                } else {
                    this.showNotification(data.message, 'error');
                }
            });
        },

        handleFileChange(e) {
            const file = e.target.files[0];
            if (file) {
                this.imageFile = file;
                this.imagePreview = URL.createObjectURL(file);
            }
        },

        processImage() {
            this.loading = true;
            const formData = new FormData();
            formData.append('image', this.imageFile);
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            fetch('{% url "process_image" %}', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.populateStaged(data.data);
                    this.reviewMode = true;
                } else {
                    this.showNotification(data.message, 'error');
                }
            });
        },

        populateStaged(data) {
            this.stagedTransactions = [];
            // Data is { "Category": [ ["Vendor", Amount, "Desc", "Type"], ... ], ... }
            for (const [category, items] of Object.entries(data)) {
                if (Array.isArray(items)) {
                    items.forEach(item => {
                        this.stagedTransactions.push({
                            vendor: item[0] || 'Unknown',
                            category: category,
                            amount: item[1] || 0,
                            description: item[2] || '',
                            type: (item[3] || 'EXPENSE').toUpperCase(),
                            source: this.activeTab.toUpperCase()
                        });
                    });
                }
            }
        },

        addStagedRow() {
            this.stagedTransactions.push({
                vendor: '', category: 'Other', amount: 0, description: '', type: 'EXPENSE', source: this.activeTab.toUpperCase()
            });
        },

        removeStaged(index) {
            this.stagedTransactions.splice(index, 1);
        },

        confirmStaged() {
            this.loading = true;
            fetch('{% url "save_confirmed" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ 
                    transactions: this.stagedTransactions,
                    is_external: this.aiExternal 
                })
            })
            .then(res => res.json())
            .then(data => {
                this.loading = false;
                if (data.status === 'success') {
                    this.showNotification(data.message, 'success');
                    setTimeout(() => window.location.reload(), 1500); 
                } else {
                    this.showNotification(data.message, 'error');
                }
            });
        },

        showNotification(msg, type) {
            this.notification = { message: msg, type: type };
            setTimeout(() => this.notification.message = '', 3000);
        },

        resetForms() {
             this.manualData = { vendor_name: '', amount: '', category: 'Food', transaction_type: 'EXPENSE', description: '', is_external: false };
             this.voiceTranscript = '';
             this.imageFile = null;
             this.imagePreview = null;
             this.stagedTransactions = [];
             this.reviewMode = false;
        }

    }))
});
</script>
