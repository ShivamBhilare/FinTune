{% load static %}
<div x-show="transactionModalOpen" x-cloak style="display: none;" x-data="transactionModalHandler()"
    class="fixed inset-0 z-[60] flex items-center justify-center p-4">

    <div x-show="transactionModalOpen" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0" @click="transactionModalOpen = false"
        class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>

    <div x-show="transactionModalOpen" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 scale-95 translate-y-4"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 scale-100 translate-y-0"
        x-transition:leave-end="opacity-0 scale-95 translate-y-4"
        class="relative w-full max-w-lg bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl flex flex-col overflow-hidden">

        <div class="flex items-center justify-between p-6 border-b border-slate-700">
            <h3 class="text-xl font-bold text-white">New Transaction</h3>
            <button @click="transactionModalOpen = false" class="text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="flex p-2 bg-slate-900/50 gap-2 border-b border-slate-700">
            <button @click="activeTab = 'manual'"
                :class="activeTab === 'manual' ? 'bg-slate-700 text-yellow-400 border-slate-600' : 'text-slate-400 hover:text-white border-transparent'"
                class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition-all border">
                <i class="fas fa-keyboard"></i> Manual
            </button>
            <button @click="activeTab = 'voice'"
                :class="activeTab === 'voice' ? 'bg-slate-700 text-green-400 border-slate-600' : 'text-slate-400 hover:text-white border-transparent'"
                class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition-all border">
                <i class="fas fa-microphone"></i> Voice
            </button>
            <button @click="activeTab = 'image'"
                :class="activeTab === 'image' ? 'bg-slate-700 text-yellow-400 border-slate-600' : 'text-slate-400 hover:text-white border-transparent'"
                class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition-all border">
                <i class="fas fa-camera"></i> Scan
            </button>
        </div>

        <div class="p-6">

            <div x-show="activeTab === 'manual'" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Amount</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">₹</span>
                        <input type="number" placeholder="0.00"
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-8 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all">
                    </div>
                </div>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Category</label>
                    <select
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all appearance-none">
                        <option>Food & Dining</option>
                        <option>Transportation</option>
                        <option>Shopping</option>
                        <option>Bills & Utilities</option>
                    </select>
                </div>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Description</label>
                    <input type="text" placeholder="What was this for?"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all">
                </div>
                <button
                    class="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-bold py-3.5 rounded-xl transition-all shadow-lg mt-2 active:scale-95">
                    Save Transaction
                </button>
            </div>

            <div x-show="activeTab === 'voice'"
                class="flex flex-col items-center justify-center py-8 space-y-6 text-center">
                <div class="relative group cursor-pointer" @click="toggleListening()">
                    <div class="absolute inset-0 bg-green-500/20 rounded-full group-hover:bg-green-500/30"
                         :class="{'animate-ping': isListening}">
                    </div>
                    <div
                        class="relative w-24 h-24 bg-slate-800 border-2 border-green-500 rounded-full flex items-center justify-center shadow-lg transition-transform group-active:scale-95">
                        <i class="fas fa-microphone text-4xl text-green-500" :class="{'text-white': isListening}"></i>
                    </div>
                </div>
                <div>
                    <h4 class="text-white font-bold text-lg mb-1" x-text="isListening ? 'Tap to Stop' : 'Tap to Speak'">Tap to Speak</h4>
                    <p class="text-slate-400 text-sm" x-text="isListening ? 'Listening...' : '&quot;Spent ₹15 at Starbucks for coffee&quot;'">"Spent ₹15 at Starbucks for coffee"</p>
                </div>
                <div class="w-full bg-slate-900 p-3 rounded-lg border border-slate-700 text-left relative">
                    <p class="text-xs text-slate-500 uppercase mb-1">Transcript</p>
                    <p class="text-white text-sm italic pr-8" x-text="transcript || (isListening ? 'Listening...' : 'Transcript will appear here...')">Listening...</p>
                    <button class="absolute bottom-3 right-3 text-slate-400 hover:text-yellow-400 transition-colors" title="Process Transaction">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <div x-show="activeTab === 'image'" class="space-y-4">
                <div
                    class="border-2 border-dashed border-slate-700 rounded-xl bg-slate-900 p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:border-yellow-400 hover:bg-slate-800/50 transition-all group">
                    <div
                        class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                        <i class="fas fa-camera text-2xl text-yellow-400"></i>
                    </div>
                    <h4 class="text-white font-bold mb-1">Scan Receipt</h4>
                    <p class="text-slate-400 text-xs">Drag & drop or click to upload</p>
                </div>
                <div class="text-center">
                    <p class="text-xs text-slate-500">We'll extract the date, merchant, and total automatically.</p>
                </div>
                <button
                    class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold py-3 rounded-xl transition-all">
                    Select from Gallery
                </button>
            </div>

        </div>
    </div>
</div>

<script>
    function transactionModalHandler() {
        return {
            activeTab: 'manual',
            isListening: false,
            transcript: '',
            recognition: null,
            fullFinalTranscript: '',

            init() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    this.recognition = new SpeechRecognition();
                    this.recognition.continuous = true;
                    this.recognition.interimResults = true;

                    this.recognition.onresult = (event) => {
                        let interimTranscript = '';
                        let eventFinalTranscript = '';

                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) {
                                eventFinalTranscript += event.results[i][0].transcript + ' ';
                            } else {
                                interimTranscript += event.results[i][0].transcript;
                            }
                        }

                        this.fullFinalTranscript += eventFinalTranscript;
                        this.transcript = this.fullFinalTranscript + interimTranscript;
                    };

                    this.recognition.onstart = () => {
                        this.isListening = true;
                    };

                    this.recognition.onend = () => {
                        this.isListening = false;
                    };

                    this.recognition.onerror = (event) => {
                        console.error('Speech recognition error:', event.error);
                        this.isListening = false;
                    };
                }
            },

            toggleListening() {
                if (!this.recognition) {
                    this.init();
                }
                
                if (!this.recognition) {
                    alert('Speech Recognition is not supported in this browser.');
                    return;
                }

                if (this.isListening) {
                    this.recognition.stop();
                } else {
                    this.fullFinalTranscript = '';
                    this.transcript = '';
                    this.recognition.start();
                }
            }
        }
    }
</script>
