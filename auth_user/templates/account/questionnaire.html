{% extends "auth_base.html" %}
{% load static %}

{% block content %}
<!-- Use h-full to center within the dashboard content area without causing scrollbars -->
<div class="h-full flex items-center justify-center p-4">

    <!-- Increased width to max-w-xl for better spacing -->
    <div class="w-full max-w-xl rounded-3xl  ">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mb-2 font-display">Before You Login</h2>
            <p class="text-sm text-brand-textMuted">Help us to build your profile</p>
        </div>

        <form method="post" class="space-y-6" onsubmit="setLoading(this, true)">
            {% csrf_token %}

            <!-- Name Row -->
            <div class="flex flex-col md:flex-row gap-4">
                <div class="w-full md:w-1/2">
                    <label for="id_first_name"
                        class="block text-xs font-bold text-brand-textMuted mb-1.5 uppercase tracking-wider">First
                        Name</label>
                    <input type="text" name="first_name" id="id_first_name" placeholder="John" required
                        class="w-full bg-brand-dark border border-brand-surface rounded-xl py-3 px-4 text-white focus:outline-none focus:border-brand-secondary focus:ring-1 focus:ring-brand-secondary transition-all placeholder-brand-textMuted/30"
                        value="{{ form.first_name.value|default:'' }}">
                </div>
                <div class="w-full md:w-1/2">
                    <label for="id_last_name"
                        class="block text-xs font-bold text-brand-textMuted mb-1.5 uppercase tracking-wider">Last
                        Name</label>
                    <input type="text" name="last_name" id="id_last_name" placeholder="Doe" required
                        class="w-full bg-brand-dark border border-brand-surface rounded-xl py-3 px-4 text-white focus:outline-none focus:border-brand-secondary focus:ring-1 focus:ring-brand-secondary transition-all placeholder-brand-textMuted/30"
                        value="{{ form.last_name.value|default:'' }}">
                </div>
            </div>

            <!-- Phone Number -->
            <div>
                <label for="id_phone_number"
                    class="block text-xs font-bold text-brand-textMuted mb-1.5 uppercase tracking-wider">Phone
                    Number</label>
                <input type="tel" name="phone_number" id="id_phone_number" placeholder="e.g., 9820019099" required
                    class="w-full bg-brand-dark border border-brand-surface rounded-xl py-3 px-4 text-white focus:outline-none focus:border-brand-secondary focus:ring-1 focus:ring-brand-secondary transition-all placeholder-brand-textMuted/30">
            </div>

            <!-- Income -->
            <div>
                <label for="id_monthly_income"
                    class="block text-xs font-bold text-brand-textMuted mb-1.5 uppercase tracking-wider">Monthly
                    Income</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-textMuted font-sans">₹</span>
                    <input type="number" name="monthly_income" id="id_monthly_income" placeholder="25000" required
                        min="0"
                        class="w-full bg-brand-dark border border-brand-surface rounded-xl py-3 pl-8 pr-4 text-white focus:outline-none focus:border-brand-secondary focus:ring-1 focus:ring-brand-secondary transition-all placeholder-brand-textMuted/30">
                </div>
            </div>

            <!-- Balance -->
            <div>
                <label for="id_cash_balance"
                    class="block text-xs font-bold text-brand-textMuted mb-1.5 uppercase tracking-wider">Current
                    Balance</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-textMuted font-sans">₹</span>
                    <input type="number" name="cash_balance" id="id_cash_balance" placeholder="50000" required min="0"
                        class="w-full bg-brand-dark border border-brand-surface rounded-xl py-3 pl-8 pr-4 text-white focus:outline-none focus:border-brand-secondary focus:ring-1 focus:ring-brand-secondary transition-all placeholder-brand-textMuted/30">
                </div>
            </div>

            <!-- Fixed Expenses -->
            <div>
                <label for="id_fixed_expenses"
                    class="block text-xs font-bold text-brand-textMuted mb-1.5 uppercase tracking-wider">Fixed Expenses
                    (Rent/Bills)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-textMuted font-sans">₹</span>
                    <input type="number" name="fixed_expenses" id="id_fixed_expenses" placeholder="12000" required
                        min="0"
                        class="w-full bg-brand-dark border border-brand-surface rounded-xl py-3 pl-8 pr-4 text-white focus:outline-none focus:border-brand-secondary focus:ring-1 focus:ring-brand-secondary transition-all placeholder-brand-textMuted/30">
                </div>
            </div>

            <!-- Submit Button -->

            <button type="submit"
                class="btn-submit w-full flex items-center justify-center px-4 py-3 border border-transparent text-sm font-medium rounded-xl shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-500 focus:ring-opacity-50 transition duration-300 ease-in-out mt-6">
                <span class="mr-2">Submit</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>
</div>
{% endblock content %}
