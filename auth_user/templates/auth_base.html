{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block head_title %}FinTune{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate-900 */
            color: #e2e8f0; /* Slate-200 */
        }

        /* Input focus ring animation */
        .input-field:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25); /* Indigo-500 with opacity */
            border-color: #6366f1;
            transition: box-shadow 0.2s ease-in-out;
        }

        /* Spinner for buttons */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

    <div class="mb-8 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-900/50 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-white">FinTune</h1>
    </div>

    <div class="w-full max-w-md bg-[#1e293b] rounded-2xl shadow-2xl border border-[#334155] overflow-hidden">
        <div class="p-6 md:p-8">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="mt-8 text-center text-xs text-slate-500">
        &copy; 2025 FinTune. All rights reserved.
    </footer>

    <script>
        // Function to toggle loading state on buttons
        function setLoading(form, isLoading) {
            const btn = form.querySelector('.btn-submit');
            if (!btn) return;
            
            const text = btn.querySelector('span');
            const spinner = btn.querySelector('.spinner');

            if (isLoading) {
                if(text) text.style.opacity = '0';
                if(spinner) spinner.style.display = 'block';
                btn.disabled = true;
                btn.style.cursor = 'wait';
            } else {
                if(text) text.style.opacity = '1';
                if(spinner) spinner.style.display = 'none';
                btn.disabled = false;
                btn.style.cursor = 'pointer';
            }
        }
        
        // Apply Tailwind classes to allauth form inputs
        window.onload = function() {
            document.querySelectorAll('form input:not([type="checkbox"]):not([type="radio"]):not([type="hidden"])').forEach(input => {
                input.classList.add(
                    'input-field', 
                    'w-full', 
                    'px-4', 
                    'py-2.5', 
                    'rounded-lg', 
                    'bg-[#0f172a]', 
                    'border', 
                    'border-[#334155]', 
                    'text-white', 
                    'focus:outline-none', 
                    'transition-colors', 
                    'duration-200', 
                    'placeholder-slate-600'
                );
            });
            
            // Adjust placeholders based on field name
            const loginInput = document.getElementById('id_login');
            if(loginInput) loginInput.placeholder = 'Your username or email';
            
            const passwordInput = document.getElementById('id_password');
            if(passwordInput) passwordInput.placeholder = '********';

        };
    </script>
    {% block extra_script %}{% endblock %}
</body>
</html>
